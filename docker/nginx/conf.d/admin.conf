# 独立后台域名：本机 hosts 增加 127.0.0.1 admin.localhost
# .env 示例：APP_FRONT_DOMAIN=localhost  ADMIN_DOMAIN=admin.localhost  APP_URL=http://localhost:8083
# 前台：http://localhost:8083  后台：http://admin.localhost:8083
server {
    listen 80;
    server_name admin.localhost;
    client_max_body_size 50m;

    root /var/www/html/public;
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 300;
    }

    location ~* \.(jpg|jpeg|png|gif|svg|css|js|ico|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }
}
